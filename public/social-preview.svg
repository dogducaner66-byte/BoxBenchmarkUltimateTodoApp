  <text x="120" y="184" fill="#ffe5cb" font-family="Georgia, serif" font-size="40" letter-spacing="8">HARBOR &amp; HEARTH</text>
  <text x="120" y="286" fill="#fff8f1" font-family="Georgia, serif" font-size="76" font-weight="700">Waterfront brunch,</text>
