  <title id="title">Harbor and Hearth social preview</title>
  <desc id="desc">Warm cafe social preview graphic with reservation-first copy.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5dcc4"/>
      <stop offset="50%" stop-color="#cc7b4f"/>
      <stop offset="100%" stop-color="#23100e"/>
